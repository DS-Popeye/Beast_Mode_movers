backend:
  name: git-gateway
  branch: master

local_backend: true

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "media"
    label: "Media Library"
    folder: "src/content/media"
    create: true
    extension: "json"
    format: "json"
    identifier_field: "alt_text"
    fields:
      - { name: "image", label: "Image", widget: "image", required: true }
      - { name: "alt_text", label: "Alt Text", widget: "string", required: true }
      - { name: "caption", label: "Caption", widget: "string", required: false }

  - name: "image_settings"
    label: "Image Settings"
    files:
      - name: "images"
        label: "Image Index"
        file: "src/content/images.json"
        fields:
          - label: "Images"
            name: "images"
            widget: "list"
            summary: "{{fields.alt_text}}"
            allow_add: true
            fields:
              - { name: "image", label: "Image", widget: "image", required: true }
              - { name: "alt_text", label: "Alt Text", widget: "string", required: true }
              - { name: "caption", label: "Caption", widget: "string", required: false }

  - name: "services"
    label: "Services"
    files:
      - name: "services"
        label: "Service Details"
        file: "src/content/services.json"
        fields:
          - label: "Local Moving"
            name: "local_moving"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string", required: true }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text", required: true }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Image Alt Text", name: "image_alt", widget: "string", required: false }
              - { label: "Features", name: "features", widget: "list", required: false }
              - { label: "CTA Button", name: "cta_button", widget: "string", required: false }
          - label: "Long Distance Moving"
            name: "long_distance_moving"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string", required: true }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text", required: true }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Image Alt Text", name: "image_alt", widget: "string", required: false }
              - { label: "Features", name: "features", widget: "list", required: false }
              - { label: "CTA Button", name: "cta_button", widget: "string", required: false }
          - label: "Residential Moving"
            name: "moving_service"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string", required: true }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text", required: true }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Image Alt Text", name: "image_alt", widget: "string", required: false }
              - { label: "Features", name: "features", widget: "list", required: false }
              - { label: "CTA Button", name: "cta_button", widget: "string", required: false }
          - label: "Commercial Moving"
            name: "commercial_moving"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string", required: true }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text", required: true }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Image Alt Text", name: "image_alt", widget: "string", required: false }
              - { label: "Features", name: "features", widget: "list", required: false }
              - { label: "CTA Button", name: "cta_button", widget: "string", required: false }
          - label: "Packing Services"
            name: "packing_service"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string", required: true }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text", required: true }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Image Alt Text", name: "image_alt", widget: "string", required: false }
              - { label: "Features", name: "features", widget: "list", required: false }
              - { label: "CTA Button", name: "cta_button", widget: "string", required: false }
          - label: "Specialty Moves"
            name: "specialty_moves"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string", required: true }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text", required: true }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Image Alt Text", name: "image_alt", widget: "string", required: false }
              - { label: "Features", name: "features", widget: "list", required: false }
              - { label: "CTA Button", name: "cta_button", widget: "string", required: false }

  - name: "service_page_content"
    label: "Service Page Content"
    files:
      - name: "service_pages"
        label: "Detailed Service Sections"
        file: "src/content/servicePages.json"
        fields:
          - label: "Future Service Routes"
            name: "future_routes"
            widget: "list"
            required: false
            fields:
              - { label: "Slug", name: "slug", widget: "string", required: true }
              - { label: "Title", name: "title", widget: "string", required: true }
          - label: "Service Sections"
            name: "service_sections"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string", required: true }
              - { label: "Title", name: "title", widget: "string", required: true }
              - { label: "Summary", name: "summary", widget: "text", required: true }
              - { label: "CTA", name: "cta", widget: "string", required: true }
          - label: "Service FAQs"
            name: "faqs"
            widget: "list"
            fields:
              - { label: "Question", name: "q", widget: "string", required: true }
              - { label: "Answer", name: "a", widget: "text", required: true }

  - name: "forms"
    label: "Forms"
    files:
      - name: "forms"
        label: "Lead Form"
        file: "src/content/forms.json"
        fields:
          - label: "Lead Form"
            name: "lead_form"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string", required: false }
              - { label: "CTA Title", name: "cta_title", widget: "string", required: true }
              - { label: "CTA Description", name: "cta_description", widget: "text", required: true }
              - { label: "Trust Points", name: "trust_points", widget: "list", required: false }
              - { label: "Footer Note", name: "footer_note", widget: "text", required: false }
              - { label: "Form Title", name: "form_title", widget: "string", required: true }
              - { label: "Success Title", name: "success_title", widget: "string", required: true }
              - { label: "Success Message", name: "success_message", widget: "text", required: true }
              - label: "Form Fields"
                name: "form_fields"
                widget: "list"
                allow_add: true
                summary: "{{fields.label}} ({{fields.type}})"
                fields:
                  - { label: "Name", name: "name", widget: "string", required: true, hint: "Form submission key, such as full_name or email." }
                  - { label: "Type", name: "type", widget: "select", required: true, options: ["text", "email", "date", "select", "textarea", "checkbox"] }
                  - { label: "Label", name: "label", widget: "string", required: true }
                  - { label: "Required", name: "required", widget: "boolean", required: false, default: false }
                  - { label: "Placeholder", name: "placeholder", widget: "string", required: false }
                  - { label: "Options", name: "options", widget: "list", required: false, hint: "Only used when Type is select." }
                  - { label: "Checkbox Value", name: "value", widget: "string", required: false, hint: "Only used when Type is checkbox." }
              - { label: "CTA Button Text", name: "cta_button_text", widget: "string", required: true }
              - { label: "Privacy Note", name: "privacy_note", widget: "string", required: false }

  - name: "settings"
    label: "Settings"
    files:
      - name: "site"
        label: "Global Site Settings"
        file: "src/content/site.json"
        fields:
          - { label: "Site Title", name: "site_title", widget: "string", required: true }
          - { label: "Site Description", name: "site_description", widget: "text", required: true }
          - { label: "Phone Number Display", name: "contactPhoneDisplay", widget: "string", required: false, hint: "Shown on the website, for example (321) 000-0000. Leave blank until the real number is confirmed." }
          - { label: "Phone Number for Click-to-Call", name: "contactPhoneTel", widget: "string", required: false, hint: "Use tel-safe format when real number is known, for example +13210000000. Leave blank to send users to the quote form." }
          - { label: "Contact Email", name: "contactEmail", widget: "string", required: false, hint: "Used for mail links. Leave blank if no public email is confirmed." }
          - { label: "Contact Location", name: "contactLocation", widget: "text", required: false, hint: "Shown in the footer. Example: Melbourne, FL on one line and Brevard County, Florida on the next." }
          - { label: "Website URL", name: "websiteUrl", widget: "string", required: false, hint: "Public website URL shown in the footer." }
          - { label: "Facebook URL", name: "facebookUrl", widget: "string", required: false, hint: "Example: https://www.facebook.com/yourpage. Leave blank to hide the Facebook icon." }
          - { label: "Instagram URL", name: "instagramUrl", widget: "string", required: false, hint: "Example: https://www.instagram.com/yourpage. Leave blank to hide the Instagram icon." }
          - { label: "Google URL", name: "googleUrl", widget: "string", required: false, hint: "Example: https://g.page/yourbusiness or https://www.google.com/search?q=yourbusiness. You may also enter an email address to use a mailto link. Leave blank to use Contact Email if available." }
          - { label: "Schema", name: "schema", widget: "code", default_language: "json", required: true, hint: "Global JSON-LD business schema used across the site." }

  - name: "pages"
    label: "Pages"
    files:
      - name: "pages"
        label: "Page SEO"
        file: "src/content/pages.json"
        fields:
          - label: "Home"
            name: "home"
            widget: "object"
            fields:
              - { label: "SEO Title", name: "seo_title", widget: "string", required: true }
              - { label: "SEO Description", name: "seo_description", widget: "text", required: true }
              - { label: "Canonical URL", name: "canonical_url", widget: "string", required: true }
              - { label: "Open Graph Title", name: "og_title", widget: "string", required: true }
              - { label: "Open Graph Description", name: "og_description", widget: "text", required: true }
              - { label: "Twitter Title", name: "twitter_title", widget: "string", required: true }
              - { label: "Twitter Description", name: "twitter_description", widget: "text", required: true }
              - { label: "Schema", name: "schema", widget: "code", default_language: "json", required: true, hint: "JSON-LD object for this page." }
          - label: "Services"
            name: "services"
            widget: "object"
            fields:
              - { label: "SEO Title", name: "seo_title", widget: "string", required: true }
              - { label: "SEO Description", name: "seo_description", widget: "text", required: true }
              - { label: "Canonical URL", name: "canonical_url", widget: "string", required: true }
              - { label: "Open Graph Title", name: "og_title", widget: "string", required: true }
              - { label: "Open Graph Description", name: "og_description", widget: "text", required: true }
              - { label: "Twitter Title", name: "twitter_title", widget: "string", required: true }
              - { label: "Twitter Description", name: "twitter_description", widget: "text", required: true }
              - { label: "Schema", name: "schema", widget: "code", default_language: "json", required: true, hint: "JSON-LD object for this page." }
          - label: "About"
            name: "about"
            widget: "object"
            fields:
              - { label: "SEO Title", name: "seo_title", widget: "string", required: true }
              - { label: "SEO Description", name: "seo_description", widget: "text", required: true }
              - { label: "Canonical URL", name: "canonical_url", widget: "string", required: true }
              - { label: "Open Graph Title", name: "og_title", widget: "string", required: true }
              - { label: "Open Graph Description", name: "og_description", widget: "text", required: true }
              - { label: "Twitter Title", name: "twitter_title", widget: "string", required: true }
              - { label: "Twitter Description", name: "twitter_description", widget: "text", required: true }
              - { label: "Schema", name: "schema", widget: "code", default_language: "json", required: true, hint: "JSON-LD object for this page." }
          - label: "Locations"
            name: "locations"
            widget: "object"
            fields:
              - { label: "SEO Title", name: "seo_title", widget: "string", required: true }
              - { label: "SEO Description", name: "seo_description", widget: "text", required: true }
              - { label: "Canonical URL", name: "canonical_url", widget: "string", required: true }
              - { label: "Open Graph Title", name: "og_title", widget: "string", required: true }
              - { label: "Open Graph Description", name: "og_description", widget: "text", required: true }
              - { label: "Twitter Title", name: "twitter_title", widget: "string", required: true }
              - { label: "Twitter Description", name: "twitter_description", widget: "text", required: true }
              - { label: "Schema", name: "schema", widget: "code", default_language: "json", required: true, hint: "JSON-LD object for this page." }

  - name: "testimonials"
    label: "Testimonials"
    files:
      - name: "testimonials"
        label: "Testimonials"
        file: "src/content/testimonials.json"
        fields:
          - label: "Testimonials"
            name: "testimonials"
            widget: "list"
            summary: "{{fields.name}} - {{fields.location}}"
            allow_add: true
            fields:
              - { label: "ID", name: "id", widget: "string", required: false, hint: "Unique ID such as james-f. If left blank, add one before publishing." }
              - { label: "Name", name: "name", widget: "string", required: true }
              - { label: "Location", name: "location", widget: "string", required: true }
              - { label: "Role", name: "role", widget: "string", required: false }
              - { label: "Rating", name: "rating", widget: "number", required: true, min: 1, max: 5, value_type: "int" }
              - { label: "Quote", name: "quote", widget: "text", required: true }
              - { label: "Initials", name: "initials", widget: "string", required: false }
              - { label: "Featured", name: "featured", widget: "boolean", required: false, default: false }
              - { label: "Image", name: "image", widget: "image", required: false }
